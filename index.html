<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShapers AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-modal { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .status-go { background: #059669; color: white; }
        .status-stretch { background: #d97706; color: white; }
        .status-nogo { background: #dc2626; color: white; }
        .filter-active { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; }
        .card-hover:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8 relative min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-slate-900/90 z-[100] flex justify-center items-center hidden transition-opacity duration-300">
        <div class="glass-modal p-8 md:p-10 rounded-2xl w-full max-w-md animate-fade-in mx-4">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-800 border border-slate-700 mb-4 shadow-lg">
                    <i class="fas fa-lock text-2xl text-blue-400"></i>
                </div>
                <h2 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">CloudShapers AI</h2>
                <p class="text-slate-400 mt-2 text-sm">Beveiligde toegang vereist</p>
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="password" id="password-input" placeholder="Voer je wachtwoord in..." 
                               class="bg-slate-900/50 border border-slate-600 text-white rounded-xl block w-full pl-12 p-3.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition shadow-inner" required>
                    </div>
                </div>
                
                <p id="login-error" class="text-red-400 text-sm mb-5 hidden font-medium text-center bg-red-900/20 py-2 rounded-lg border border-red-500/30"></p>
                
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-3.5 rounded-xl transition shadow-[0_0_15px_rgba(37,99,235,0.4)] flex items-center justify-center text-lg">
                    <i class="fas fa-sign-in-alt mr-2"></i> Inloggen
                </button>
            </form>
        </div>
    </div>
    
    <div class="max-w-screen-2xl mx-auto pb-20">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">CloudShapers AI</h1>
                <p class="text-slate-400 font-medium text-sm tracking-wide">AI-Driven Recruitment Matching</p>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-lg transition flex items-center shadow-lg font-bold">
                    <i class="fas fa-sync-alt mr-2"></i> Verversen
                </button>
                <button onclick="resetLogin()" class="bg-slate-700 hover:bg-red-600 px-4 py-2.5 rounded-lg transition flex items-center shadow-lg font-bold text-sm">
                    <i class="fas fa-sign-out-alt mr-2"></i> Uitloggen
                </button>
            </div>
        </header>

        <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

        <div class="glass p-4 rounded-xl mb-8 flex flex-col xl:flex-row gap-4 justify-between items-center sticky top-4 z-10 shadow-2xl">
            <div class="relative w-full xl:w-96">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Zoek op rol, klant of kandidaat..." 
                       class="bg-slate-800 border border-slate-600 text-white text-sm rounded-lg block w-full pl-10 p-2.5 outline-none focus:border-blue-500">
            </div>
            <div class="flex flex-wrap gap-2 w-full xl:w-auto items-center">
                <div class="border-r border-slate-600 pr-2 mr-1 flex gap-2">
                    <button onclick="setFilter('RELEVANT')" id="btn-RELEVANT" class="filter-active border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Relevant</button>
                    <button onclick="setFilter('IRRELEVANT')" id="btn-IRRELEVANT" class="border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Ruis</button>
                </div>
                <button onclick="setFilter('MAIL')" id="btn-MAIL" class="border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition"><i class="fas fa-envelope mr-1"></i> Mail</button>
                <button onclick="setFilter('THISWORKZ')" id="btn-THISWORKZ" class="border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition"><i class="fas fa-plug mr-1"></i> ThisWorkz</button>
                <button onclick="setFilter('ALL')" id="btn-ALL" class="ml-1 border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Alles</button>
                
                <select id="sortOrder" onchange="applyFilters()" class="ml-2 bg-slate-800 border border-slate-600 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition outline-none focus:border-blue-500 cursor-pointer">
                    <option value="desc">Nieuwste eerst ⬇</option>
                    <option value="asc">Oudste eerst ⬆</option>
                </select>
            </div>
        </div>

        <div id="app-container" class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10 text-slate-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Initialiseren...</p>
            </div>
        </div>
    </div>

    <button onclick="toggleDebug()" class="fixed bottom-4 right-4 bg-slate-800 text-slate-400 px-4 py-2 rounded-full text-sm hover:text-white hover:bg-slate-700 z-40 border border-slate-600 shadow-lg transition">
        <i class="fas fa-bug mr-1"></i> Debug Console
    </button>

    <div id="debug-log" class="fixed bottom-0 left-0 right-0 h-64 bg-slate-900 text-green-400 font-mono text-xs p-4 overflow-y-auto z-50 border-t-2 border-slate-700 hidden shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700 text-white font-bold sticky top-0 bg-slate-900 pt-1">
            <span><i class="fas fa-terminal mr-2"></i> Systeem Logboek</span>
            <button onclick="toggleDebug()" class="text-slate-400 hover:text-red-400 transition"><i class="fas fa-times fa-lg"></i></button>
        </div>
        <div id="debug-output" class="space-y-1"></div>
    </div>

    <script>
        const API_MAIL = 'https://cloudshaper-api.timosteen22.workers.dev';
        const API_THISWORKZ = 'https://api-thisworks.timo-vandersteen.workers.dev/api/opportunities'; 
        
        let apiKey = localStorage.getItem('dashboard_key');
        let allItems = [];
        let currentFilter = 'RELEVANT';

        // --- UI LOGIN LOGICA ---
        function handleLogin(e) {
            e.preventDefault();
            const pwd = document.getElementById('password-input').value;
            if (pwd) {
                localStorage.setItem('dashboard_key', pwd);
                apiKey = pwd;
                
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('login-error').classList.add('hidden');
                
                fetchData();
            }
        }

        function showLoginUI(errorMessage = null) {
            document.getElementById('login-overlay').classList.remove('hidden');
            document.getElementById('app-container').innerHTML = ''; 
            document.getElementById('stats').innerHTML = ''; 
            
            if (errorMessage) {
                const errorEl = document.getElementById('login-error');
                errorEl.innerHTML = `<i class="fas fa-exclamation-triangle mr-1"></i> ${errorMessage}`;
                errorEl.classList.remove('hidden');
            }
        }

        function resetLogin() {
            localStorage.removeItem('dashboard_key');
            apiKey = null;
            document.getElementById('password-input').value = '';
            document.getElementById('login-error').classList.add('hidden');
            showLoginUI();
        }
        // -----------------------

        const debugOutput = document.getElementById('debug-output');
        function logDebug(msg, type = 'info') {
            const div = document.createElement('div');
            let color = 'text-green-400';
            if (type === 'error') color = 'text-red-400 font-bold';
            if (type === 'warn') color = 'text-yellow-400';
            
            div.className = color;
            div.innerHTML = `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            debugOutput.prepend(div);
            
            if (type === 'error') console.error(msg);
            else console.log(msg);
        }

        function toggleDebug() {
            const debugLog = document.getElementById('debug-log');
            debugLog.classList.toggle('hidden');
        }

        async function fetchData() {
            if (!apiKey) {
                showLoginUI();
                return;
            }

            logDebug(`Data ophalen van beide API's...`);
            document.getElementById('app-container').innerHTML = `<div class="col-span-full text-center py-10 text-slate-500"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Data synchroniseren uit Mail & ThisWorkz...</p></div>`;
            
            allItems = []; 
            
            try {
                const [mailResponse, thisWorkzResponse] = await Promise.allSettled([
                    fetch(API_MAIL, { headers: { "x-api-key": apiKey } }),
                    fetch(API_THISWORKZ)
                ]);

                if (mailResponse.status === 'fulfilled' && mailResponse.value.status === 401) {
                    localStorage.removeItem('dashboard_key');
                    apiKey = null;
                    showLoginUI("Toegang geweigerd. Verkeerd wachtwoord.");
                    logDebug("Foutief wachtwoord gebruikt bij Mail API.", "error");
                    return;
                }

                // Verwerk Mail / Cloudflare DB Data
                if (mailResponse.status === 'fulfilled' && mailResponse.value.ok) {
                    const dbData = await mailResponse.value.json();
                    if (Array.isArray(dbData)) {
                        dbData.forEach(item => {
                            // 1. BRON BEPALEN (Badge & Logo)
                            if (item.remote_id && item.remote_id !== 'null') {
                                item._bron = 'THISWORKZ';
                                item.id = item.remote_id; 
                            } else {
                                item._bron = 'MAIL';
                            }

                            // 2. RELEVANTIE BEPALEN (Voor de filters bovenin)
                            if (item.match_status === 'GO' || item.match_status === 'STRETCH') {
                                item.is_relevant = true;
                            } else {
                                item.is_relevant = false;
                            }
                        });
                        allItems = allItems.concat(dbData);
                        logDebug(`${dbData.length} items uit Cloudflare DB geladen.`);
                    }
                } else {
                    logDebug(`Fout bij laden Mail API`, 'error');
                }

                // Verwerk ThisWorkz Data
                if (thisWorkzResponse.status === 'fulfilled' && thisWorkzResponse.value.ok) {
                    const twData = await thisWorkzResponse.value.json();
                    if (Array.isArray(twData)) {
                        twData.forEach(item => item._bron = 'THISWORKZ');
                        allItems = allItems.concat(twData);
                        logDebug(`${twData.length} items uit ThisWorkz API geladen.`);
                    }
                } else {
                    logDebug(`Fout bij laden ThisWorkz API. Status: ${thisWorkzResponse.status}`, 'error'); 
                }

                if (allItems.length === 0) {
                    throw new Error("Geen data gevonden in beide API's.");
                }

                logDebug(`Totaal ${allItems.length} aanvragen succesvol gecombineerd.`);
                updateStats();
                applyFilters();
            } catch (e) {
                logDebug(`CRITIEKE FOUT: ${e.message}`, 'error');
                document.getElementById('app-container').innerHTML = `
                    <div class="col-span-full bg-red-900/30 border border-red-500 p-6 rounded-xl text-center shadow-lg">
                        <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
                        <h3 class="text-xl font-bold text-red-400 mb-2">Kan de data niet laden</h3>
                        <p class="text-slate-300 text-sm">Controleer de debug console (rechtsonder).</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = allItems.length;
            const relevantCount = allItems.filter(i => i.is_relevant === 1 || i.is_relevant === true).length;
            const twCount = allItems.filter(i => i._bron === 'THISWORKZ').length;
            const goMatches = allItems.filter(i => i.match_status === 'GO' && (i.is_relevant === 1 || i.is_relevant === true)).length;

            document.getElementById('stats').innerHTML = `
                <div class="glass p-5 rounded-xl border-l-4 border-blue-500"><p class="text-slate-400 text-[10px] font-bold uppercase">Totaal Aanvragen</p><p class="text-2xl font-bold">${total}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-green-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-green-400">Relevant</p><p class="text-2xl font-bold">${relevantCount}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-indigo-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-indigo-400">Via ThisWorkz</p><p class="text-2xl font-bold">${twCount}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-purple-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-purple-400">Directe Matches</p><p class="text-2xl font-bold">${goMatches}</p></div>
            `;
        }

        function setFilter(f) { 
            currentFilter = f; 
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('filter-active'));
            document.getElementById(`btn-${f}`).classList.add('filter-active');
            logDebug(`Filter toegepast: ${f}`);
            applyFilters(); 
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sortOrder = document.getElementById('sortOrder').value;

            const filtered = allItems.filter(item => {
                const isRel = item.is_relevant === 1 || item.is_relevant === true;
                
                let matchesFilter = false;
                if (currentFilter === 'ALL') matchesFilter = true;
                else if (currentFilter === 'RELEVANT') matchesFilter = isRel;
                else if (currentFilter === 'IRRELEVANT') matchesFilter = !isRel;
                else if (currentFilter === 'MAIL') matchesFilter = (item._bron === 'MAIL');
                else if (currentFilter === 'THISWORKZ') matchesFilter = (item._bron === 'THISWORKZ');
                
                const searchData = `${item.rol || ''} ${item.klant || ''} ${item.eindklant || ''} ${item.broker || ''} ${item.id || ''}`.toLowerCase();
                return matchesFilter && searchData.includes(search);
            });

            // Sorteren op basis van de gekozen datum weergave
            filtered.sort((a, b) => {
                const dateA = new Date(a.datum || 0);
                const dateB = new Date(b.datum || 0);
                return sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
            });

            renderDashboard(filtered);
        }

        async function deleteItem(id, bron) {
            if (!confirm(`Weet je zeker dat je deze aanvraag (${bron}) wilt verwijderen?`)) return;
            logDebug(`Verwijder-verzoek voor ID: ${id} via ${bron}`, 'warn');
            
            const targetApi = (bron === 'THISWORKZ') ? API_THISWORKZ : API_MAIL;
            
            try {
                const fetchOptions = { method: 'DELETE' };
                if (bron === 'MAIL') {
                    fetchOptions.headers = { "x-api-key": apiKey };
                }

                const response = await fetch(`${targetApi}?id=${id}`, fetchOptions);

                if (response.status === 401) {
                    alert("⚠️ Toegang geweigerd: Je hebt niet de juiste rechten om items te verwijderen.");
                    return;
                }

                logDebug(`Item succesvol verwijderd uit ${bron}.`);
                fetchData(); 
            } catch (e) {
                logDebug(`Fout bij verwijderen: ${e.message}`, 'error');
            }
        }

        function renderDashboard(items) {
            const container = document.getElementById('app-container');
            
            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 italic">Geen resultaten gevonden voor dit filter.</div>`;
                return;
            }

            container.innerHTML = items.map(item => {
                let kandidaten = [];
                try { 
                    kandidaten = typeof item.kandidaten_json === 'string' ? JSON.parse(item.kandidaten_json) : item.kandidaten_json; 
                } catch(e) {}

                const statusClass = item.match_status === 'GO' ? 'status-go' : (item.match_status === 'STRETCH' ? 'status-stretch' : 'status-nogo');
                const isRel = item.is_relevant === 1 || item.is_relevant === true;

                const weergaveTitel = item.rol && item.rol !== 'null' && item.rol !== '' ? item.rol : 'Zonder Titel';
                const weergaveKlant = item.eindklant && item.eindklant !== 'null' ? item.eindklant : (item.klant && item.klant !== 'null' ? item.klant : 'Onbekende Klant');
                const weergaveLocatie = item.locatie && item.locatie !== 'null' ? item.locatie : '-';
                const weergaveTarief = item.tarief && item.tarief !== 'null' ? item.tarief : '-';
                const weergaveUren = item.uren && item.uren !== 'null' ? item.uren : '-';
                const weergaveStart = item.startdatum && item.startdatum !== 'null' ? item.startdatum : 'Z.s.m.';
                const brokerHtml = item.broker && item.broker !== 'null' ? `<span class="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-300 ml-2 border border-slate-600 font-normal">via ${item.broker}</span>` : '';
                const apiSourceHtml = item.api_source && item.api_source !== 'null' ? `<span class="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-300 ml-1 border border-slate-600 font-normal">(${item.api_source})</span>` : '';

                let sourceBadge = '';
                let idWeergave = '';
                if (item._bron === 'THISWORKZ') {
                    sourceBadge = `<span class="bg-indigo-600 text-white px-2 py-0.5 rounded text-[9px] font-bold uppercase ml-2 tracking-wider shadow"><i class="fas fa-plug mr-1"></i>ThisWorkz</span>`;
                    idWeergave = `Req ID: ${item.id}`;
                } else {
                    sourceBadge = `<span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[9px] font-bold uppercase ml-2 tracking-wider shadow"><i class="fas fa-envelope mr-1"></i>Mail</span>`;
                    idWeergave = `DB ID: ${item.id}`;
                }

                // NIEUW: Dynamische knop voor de vacature URL
                const urlButton = item.url && item.url !== 'null' ? 
                    `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="bg-slate-700 hover:bg-blue-600 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-sm transition flex items-center mr-2 border border-slate-600 hover:border-blue-500">
                        <i class="fas fa-external-link-alt mr-2"></i> Bekijk Vacature
                    </a>` : '';

                return `
                    <div class="glass p-6 rounded-xl shadow-xl transition card-hover flex flex-col h-full border border-slate-700/50 ${!isRel ? 'opacity-60 grayscale-[0.3]' : ''}">
                        
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1 pr-4">
                                <h4 class="text-sm font-black uppercase tracking-widest text-blue-400 mb-1 flex items-center flex-wrap gap-1">
                                    <i class="far fa-building mr-1"></i> ${weergaveKlant} ${brokerHtml} ${apiSourceHtml} ${sourceBadge}
                                </h4>
                                <h3 class="text-2xl font-bold text-white leading-tight">${weergaveTitel}</h3>
                            </div>
                            <div class="px-3 py-1.5 rounded-full font-bold text-xs text-white uppercase shadow-lg ${statusClass} whitespace-nowrap">${item.match_status || '?'}</div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-5 text-sm text-slate-300 font-medium bg-slate-800/50 p-3 rounded-lg border border-slate-700/30">
                            <div class="flex items-center"><i class="fas fa-map-marker-alt text-blue-400 w-5"></i> <span class="truncate">${weergaveLocatie}</span></div>
                            <div class="flex items-center"><i class="fas fa-euro-sign text-emerald-400 w-5"></i> <span>${weergaveTarief}</span></div>
                            <div class="flex items-center"><i class="fas fa-clock text-amber-400 w-5"></i> <span>${weergaveUren}</span></div>
                            <div class="flex items-center"><i class="fas fa-rocket text-purple-400 w-5"></i> <span>${weergaveStart}</span></div>
                            ${item.deadline && item.deadline !== 'null' ? `<div class="col-span-2 flex items-center mt-1 text-red-400 font-bold border-t border-slate-700/50 pt-2"><i class="fas fa-hourglass-end w-5"></i> Deadline: ${item.deadline}</div>` : ''}
                        </div>

                        ${(item.contactpersoon || item.contact_email || item.contact_telefoon) && (item.contactpersoon !== 'null' || item.contact_email !== 'null') ? `
                        <div class="mb-4 text-xs bg-slate-900/40 p-3 rounded border border-slate-700/30">
                            <p class="font-bold text-slate-400 mb-1 uppercase tracking-wider text-[10px]">Contact</p>
                            <div class="flex flex-col gap-1 text-slate-300">
                                ${item.contactpersoon && item.contactpersoon !== 'null' ? `<span class="font-medium"><i class="fas fa-user text-slate-500 w-4"></i> ${item.contactpersoon}</span>` : ''}
                                ${item.contact_email && item.contact_email !== 'null' ? `<a href="mailto:${item.contact_email}" class="hover:text-blue-400 transition"><i class="fas fa-envelope text-slate-500 w-4"></i> ${item.contact_email}</a>` : ''}
                                ${item.contact_telefoon && item.contact_telefoon !== 'null' ? `<a href="tel:${item.contact_telefoon}" class="hover:text-blue-400 transition"><i class="fas fa-phone text-slate-500 w-4"></i> ${item.contact_telefoon}</a>` : ''}
                            </div>
                        </div>
                        ` : ''}

                        <div class="bg-slate-900/60 p-4 rounded-lg mb-2 text-sm text-slate-300 leading-relaxed italic border border-slate-700/30 whitespace-pre-wrap">"${item.samenvatting && item.samenvatting !== 'null' ? item.samenvatting : 'Geen samenvatting beschikbaar.'}"</div>

                        ${item.knockout_reden && item.knockout_reden !== 'null' ? `
                        <div class="bg-red-900/30 border border-red-500/50 p-3 rounded-lg mb-5 text-sm text-red-200">
                            <i class="fas fa-ban mr-1 text-red-400"></i> <strong>Knock-out:</strong> ${item.knockout_reden}
                        </div>
                        ` : '<div class="mb-5"></div>'}

                        <div class="mt-auto">
                            <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3 border-b border-slate-700/50 pb-2">Gekoppelde Profielen</h4>
                            <div class="space-y-3">
                                ${kandidaten && kandidaten.length > 0 ? kandidaten.map(k => `
                                    <div class="flex items-start gap-3 bg-slate-800/40 p-3 rounded-lg border border-slate-700/30">
                                        <div class="mt-1 ${k.status === 'GO' ? 'text-green-400' : (k.status === 'STRETCH' ? 'text-amber-400' : 'text-red-400')}">
                                            <i class="fas ${k.status === 'GO' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-lg"></i>
                                        </div>
                                        <div class="min-w-0">
                                            <p class="font-bold text-sm text-slate-200">${k.naam || 'Onbekend'}</p>
                                            <p class="text-slate-400 text-xs mt-1 leading-relaxed">${k.reden || ''}</p>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-xs text-slate-600 italic pl-2 text-center py-4">Geen match resultaten gevonden.</p>'}
                            </div>
                        </div>
                        
                        <div class="mt-6 pt-5 border-t border-slate-800/50 flex justify-between items-center">
                            <div class="flex flex-col gap-1.5 text-sm text-slate-300 font-medium">
                                <span class="flex items-center"><i class="far fa-clock text-blue-400 w-5"></i> Ontvangen: ${item.datum ? new Date(item.datum).toLocaleString('nl-NL', {day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'}) : 'Onbekend'}</span>
                                <span class="flex items-center font-bold text-slate-100"><i class="fas fa-hashtag text-purple-400 w-5"></i> ${idWeergave}</span>
                            </div>
                            
                            <div class="flex items-center">
                                ${urlButton}
                                <button onclick="deleteItem('${item.id}', '${item._bron}')" class="text-slate-400 hover:text-white transition px-4 py-2.5 bg-slate-800 rounded-lg border border-slate-700 hover:border-red-500 hover:bg-red-500/20 shadow-sm"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        window.onload = fetchData;
    </script>
</body>
</html>
