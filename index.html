<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudShapers AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .status-go { background: #059669; color: white; }
        .status-stretch { background: #d97706; color: white; }
        .status-nogo { background: #dc2626; color: white; }
        .filter-active { background-color: #3b82f6 !important; color: white !important; border-color: #3b82f6 !important; }
        .card-hover:hover { border-color: rgba(59, 130, 246, 0.5); transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8 relative min-h-screen">
    <div class="max-w-screen-2xl mx-auto pb-20">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">CloudShapers AI</h1>
                <p class="text-slate-400 font-medium text-sm tracking-wide">AI-Driven Recruitment Matching</p>
            </div>
            <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-lg transition flex items-center shadow-lg font-bold">
                <i class="fas fa-sync-alt mr-2"></i> Verversen
            </button>
        </header>

        <div id="stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

        <div class="glass p-4 rounded-xl mb-8 flex flex-col lg:flex-row gap-4 justify-between items-center sticky top-4 z-10 shadow-2xl">
            <div class="relative w-full lg:w-96">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Zoek op rol, klant of kandidaat..." 
                       class="bg-slate-800 border border-slate-600 text-white text-sm rounded-lg block w-full pl-10 p-2.5 outline-none focus:border-blue-500">
            </div>
            <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                <button onclick="setFilter('RELEVANT')" id="btn-RELEVANT" class="filter-active border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Relevant</button>
                <button onclick="setFilter('IRRELEVANT')" id="btn-IRRELEVANT" class="border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Ruis (5d)</button>
                <button onclick="setFilter('ALL')" id="btn-ALL" class="border border-slate-600 bg-slate-800 text-slate-300 px-4 py-2 rounded-lg text-sm font-bold transition">Alles</button>
            </div>
        </div>

        <div id="app-container" class="grid grid-cols-1 xl:grid-cols-2 2xl:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-10 text-slate-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
                <p>Data ophalen...</p>
            </div>
        </div>
    </div>

    <button onclick="toggleDebug()" class="fixed bottom-4 right-4 bg-slate-800 text-slate-400 px-4 py-2 rounded-full text-sm hover:text-white hover:bg-slate-700 z-40 border border-slate-600 shadow-lg transition">
        <i class="fas fa-bug mr-1"></i> Debug Console
    </button>

    <div id="debug-log" class="fixed bottom-0 left-0 right-0 h-64 bg-slate-900 text-green-400 font-mono text-xs p-4 overflow-y-auto z-50 border-t-2 border-slate-700 hidden shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-700 text-white font-bold sticky top-0 bg-slate-900 pt-1">
            <span><i class="fas fa-terminal mr-2"></i> Systeem Logboek</span>
            <button onclick="toggleDebug()" class="text-slate-400 hover:text-red-400 transition"><i class="fas fa-times fa-lg"></i></button>
        </div>
        <div id="debug-output" class="space-y-1"></div>
    </div>

    <script>
        const API_URL = 'https://cloudshaper-api.timosteen22.workers.dev';
        let allItems = [];
        let currentFilter = 'RELEVANT';

        // --- DEBUGGER LOGICA ---
        const debugOutput = document.getElementById('debug-output');
        function logDebug(msg, type = 'info') {
            const div = document.createElement('div');
            let color = 'text-green-400';
            if (type === 'error') color = 'text-red-400 font-bold';
            if (type === 'warn') color = 'text-yellow-400';
            
            div.className = color;
            div.innerHTML = `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
            debugOutput.prepend(div);
            
            if (type === 'error') console.error(msg);
            else console.log(msg);
        }

        function toggleDebug() {
            const debugLog = document.getElementById('debug-log');
            debugLog.classList.toggle('hidden');
        }
        // -----------------------

        async function fetchData() {
            logDebug(`Verbinding maken met API: ${API_URL}`);
            document.getElementById('app-container').innerHTML = `<div class="col-span-full text-center py-10 text-slate-500"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Data synchroniseren...</p></div>`;
            
            try {
                const response = await fetch(API_URL);
                logDebug(`HTTP Status Code: ${response.status}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API weigerde toegang (Code ${response.status}): ${errorText}`);
                }

                allItems = await response.json();
                
                if (!Array.isArray(allItems)) {
                    throw new Error("De API gaf geen geldige array met data terug.");
                }

                logDebug(`Succes! ${allItems.length} aanvragen ingeladen in het geheugen.`);
                updateStats();
                applyFilters();
            } catch (e) {
                logDebug(`CRITIEKE FOUT: ${e.message}`, 'error');
                document.getElementById('app-container').innerHTML = `
                    <div class="col-span-full bg-red-900/30 border border-red-500 p-6 rounded-xl text-center">
                        <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
                        <h3 class="text-xl font-bold text-red-400 mb-2">Kan de data niet laden</h3>
                        <p class="text-slate-300 text-sm">Controleer de debug console (rechtsonder) voor de exacte foutmelding.</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = allItems.length;
            const relevantCount = allItems.filter(i => i.is_relevant === 1).length;
            const irrelevantCount = total - relevantCount;
            const goMatches = allItems.filter(i => i.match_status === 'GO' && i.is_relevant === 1).length;

            document.getElementById('stats').innerHTML = `
                <div class="glass p-5 rounded-xl border-l-4 border-blue-500"><p class="text-slate-400 text-[10px] font-bold uppercase">Totaal</p><p class="text-2xl font-bold">${total}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-green-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-green-400">Relevant</p><p class="text-2xl font-bold">${relevantCount}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-red-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-red-400">Ruis</p><p class="text-2xl font-bold">${irrelevantCount}</p></div>
                <div class="glass p-5 rounded-xl border-l-4 border-purple-500"><p class="text-slate-400 text-[10px] font-bold uppercase text-purple-400">Directe Matches</p><p class="text-2xl font-bold">${goMatches}</p></div>
            `;
        }

        function setFilter(f) { 
            currentFilter = f; 
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('filter-active'));
            document.getElementById(`btn-${f}`).classList.add('filter-active');
            logDebug(`Filter toegepast: ${f}`);
            applyFilters(); 
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allItems.filter(item => {
                const matchesFilter = (currentFilter === 'ALL') || (currentFilter === 'RELEVANT' && item.is_relevant === 1) || (currentFilter === 'IRRELEVANT' && item.is_relevant === 0);
                
                // Veilige fallbacks om crashes bij missende velden te voorkomen
                const rolStr = item.rol || '';
                const klantStr = item.klant || '';
                const eindklantStr = item.eindklant || '';
                const brokerStr = item.broker || '';
                const kandsStr = item.kandidaten_json || '';
                
                const searchData = `${rolStr} ${klantStr} ${eindklantStr} ${brokerStr} ${kandsStr}`.toLowerCase();
                return matchesFilter && searchData.includes(search);
            });
            renderDashboard(filtered);
        }

        async function deleteItem(id) {
            if (!confirm('Weet je zeker dat je deze aanvraag wilt verwijderen?')) return;
            logDebug(`Verwijder-verzoek verstuurd voor ID: ${id}`, 'warn');
            try {
                await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                logDebug(`Item ID ${id} succesvol verwijderd.`);
                fetchData();
            } catch (e) {
                logDebug(`Fout bij verwijderen: ${e.message}`, 'error');
            }
        }

        function renderDashboard(items) {
            const container = document.getElementById('app-container');
            
            if (items.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-slate-500 italic">Geen resultaten gevonden in deze weergave.</div>`;
                return;
            }

            container.innerHTML = items.map(item => {
                let kandidaten = [];
                try { 
                    kandidaten = typeof item.kandidaten_json === 'string' ? JSON.parse(item.kandidaten_json) : item.kandidaten_json; 
                } catch(e) { 
                    logDebug(`Fout bij inlezen kandidaten JSON voor item ${item.id}`, 'error');
                    kandidaten = []; 
                }

                const statusClass = item.match_status === 'GO' ? 'status-go' : (item.match_status === 'STRETCH' ? 'status-stretch' : 'status-nogo');
                
                const eindklantWeergave = item.eindklant ? item.eindklant : (item.klant || 'Onbekend');
                const brokerHtml = item.broker ? `<span class="bg-slate-700 px-2 py-0.5 rounded text-xs text-slate-300 ml-2 border border-slate-600 font-normal">via ${item.broker}</span>` : '';

                return `
                    <div class="glass p-6 rounded-xl shadow-xl transition card-hover flex flex-col h-full border border-slate-700/50 ${item.is_relevant === 0 ? 'opacity-60 grayscale-[0.3]' : ''}">
                        
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1 pr-4">
                                <h4 class="text-sm font-black uppercase tracking-widest text-blue-400 mb-1 flex items-center flex-wrap gap-1">
                                    <i class="far fa-building mr-1"></i> ${eindklantWeergave} ${brokerHtml}
                                </h4>
                                <h3 class="text-2xl font-bold text-white leading-tight">${item.rol || 'Zonder Titel'}</h3>
                            </div>
                            <div class="px-3 py-1.5 rounded-full font-bold text-xs text-white uppercase shadow-lg ${statusClass} whitespace-nowrap">${item.match_status || '?'}</div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mb-5 text-sm text-slate-300 font-medium bg-slate-800/50 p-3 rounded-lg border border-slate-700/30">
                            <div class="flex items-center"><i class="fas fa-map-marker-alt text-blue-400 w-5"></i> <span class="truncate">${item.locatie || '-'}</span></div>
                            <div class="flex items-center"><i class="fas fa-euro-sign text-emerald-400 w-5"></i> <span>${item.tarief ? item.tarief + '/u' : '-'}</span></div>
                            <div class="flex items-center"><i class="fas fa-clock text-amber-400 w-5"></i> <span>${item.uren || '-'}</span></div>
                            <div class="flex items-center"><i class="fas fa-rocket text-purple-400 w-5"></i> <span>${item.startdatum || 'Z.s.m.'}</span></div>
                            ${item.deadline ? `<div class="col-span-2 flex items-center mt-1 text-red-400 font-bold border-t border-slate-700/50 pt-2"><i class="fas fa-hourglass-end w-5"></i> Deadline: ${item.deadline}</div>` : ''}
                        </div>

                        ${(item.contactpersoon || item.contact_email || item.contact_telefoon) ? `
                        <div class="mb-4 text-xs bg-slate-900/40 p-3 rounded border border-slate-700/30">
                            <p class="font-bold text-slate-400 mb-1 uppercase tracking-wider text-[10px]">Contact</p>
                            <div class="flex flex-col gap-1 text-slate-300">
                                ${item.contactpersoon ? `<span class="font-medium"><i class="fas fa-user text-slate-500 w-4"></i> ${item.contactpersoon}</span>` : ''}
                                ${item.contact_email ? `<a href="mailto:${item.contact_email}" class="hover:text-blue-400 transition"><i class="fas fa-envelope text-slate-500 w-4"></i> ${item.contact_email}</a>` : ''}
                                ${item.contact_telefoon ? `<a href="tel:${item.contact_telefoon}" class="hover:text-blue-400 transition"><i class="fas fa-phone text-slate-500 w-4"></i> ${item.contact_telefoon}</a>` : ''}
                            </div>
                        </div>
                        ` : ''}

                        <div class="bg-slate-900/60 p-4 rounded-lg mb-5 text-sm text-slate-300 leading-relaxed italic border border-slate-700/30">
                            "${item.samenvatting || 'Geen samenvatting beschikbaar.'}"
                        </div>

                        <div class="mt-auto">
                            <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-3 border-b border-slate-700/50 pb-2">Gekoppelde Profielen</h4>
                            <div class="space-y-3">
                                ${kandidaten && kandidaten.length > 0 ? kandidaten.map(k => `
                                    <div class="flex items-start gap-3 bg-slate-800/40 p-3 rounded-lg border border-slate-700/30">
                                        <div class="mt-1 ${k.status === 'GO' ? 'text-green-400' : (k.status === 'STRETCH' ? 'text-amber-400' : 'text-red-400')}">
                                            <i class="fas ${k.status === 'GO' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-lg"></i>
                                        </div>
                                        <div class="min-w-0">
                                            <p class="font-bold text-sm text-slate-200">${k.naam || 'Onbekend'}</p>
                                            <p class="text-slate-400 text-xs mt-1 leading-relaxed">${k.reden || ''}</p>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-xs text-slate-600 italic pl-2 text-center py-4">Geen match resultaten gevonden.</p>'}
                            </div>
                        </div>
                        
                        <div class="mt-6 pt-4 border-t border-slate-800/50 flex justify-between items-center text-xs text-slate-400 font-medium">
                            <span><i class="far fa-clock mr-1"></i> Ontvangen: ${item.datum ? new Date(item.datum).toLocaleString('nl-NL', {day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'}) : 'Onbekend'}</span>
                            <button onclick="deleteItem(${item.id})" class="text-slate-500 hover:text-red-500 transition px-2 py-1 bg-slate-800 rounded border border-slate-700"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Data ophalen direct bij het inladen
        window.onload = fetchData;
    </script>
</body>
</html>
